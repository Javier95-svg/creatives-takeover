# Stripe calls this endpoint with only a Stripe-Signature header and no Supabase
# JWT, so the gateway MUST NOT enforce JWT auth or it 401s before the function
# runs. The function authenticates Stripe itself via webhooks.constructEvent
# (signature verification), so disabling verify_jwt does not weaken security.
[functions.stripe-webhook]
verify_jwt = false

[functions.demo-studio-generator]
verify_jwt = true

# Public launch-page signups arrive with the anon JWT that supabase-js attaches
# automatically (same as demo-studio-generator's /try path), so verify_jwt stays on.
[functions.demo-studio-lead]
verify_jwt = true

# Invoked by pg_cron via pg_net (no JWT); guarded by a CRON_SECRET header instead.
[functions.demo-studio-webhook-retry]
verify_jwt = false

