<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .compass-pulse {
      animation: compass-pulse 3.8s ease-in-out infinite;
      transform-origin: 64px 64px;
    }

    .compass-needle {
      animation: compass-needle-sweep 4.8s ease-in-out infinite;
      transform-origin: 64px 64px;
    }

    .compass-glint {
      animation: compass-glint 4.8s ease-in-out infinite;
    }

    @keyframes compass-pulse {
      0%,
      100% {
        opacity: 0.45;
        transform: scale(0.94);
      }

      50% {
        opacity: 0.78;
        transform: scale(1);
      }
    }

    @keyframes compass-needle-sweep {
      0%,
      100% {
        transform: rotate(-10deg);
      }

      42% {
        transform: rotate(14deg);
      }

      68% {
        transform: rotate(8deg);
      }
    }

    @keyframes compass-glint {
      0%,
      55%,
      100% {
        opacity: 0.18;
      }

      70% {
        opacity: 0.6;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .compass-pulse,
      .compass-needle,
      .compass-glint {
        animation: none;
      }

      .compass-pulse {
        opacity: 0.55;
      }
    }
  </style>

  <defs>
    <radialGradient id="compassGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(39 30) rotate(47) scale(101)">
      <stop stop-color="#5AA2FB" stop-opacity="0.7" />
      <stop offset="0.46" stop-color="#F37575" stop-opacity="0.28" />
      <stop offset="1" stop-color="#25CB7A" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="ringGradient" x1="21" y1="24" x2="107" y2="105" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5AA2FB" />
      <stop offset="0.52" stop-color="#F37575" />
      <stop offset="1" stop-color="#25CB7A" />
    </linearGradient>
    <linearGradient id="needleNorth" x1="64" y1="22" x2="64" y2="66" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5AA2FB" />
      <stop offset="1" stop-color="#F8A66A" />
    </linearGradient>
    <linearGradient id="needleSouth" x1="64" y1="64" x2="64" y2="106" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111827" />
      <stop offset="1" stop-color="#64748B" stop-opacity="0.78" />
    </linearGradient>
    <filter id="softShadow" x="4" y="4" width="120" height="120" color-interpolation-filters="sRGB" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="11" stdDeviation="9" flood-color="#2563EB" flood-opacity="0.24" />
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#F37575" flood-opacity="0.2" />
    </filter>
  </defs>

  <circle class="compass-pulse" cx="64" cy="64" r="57" fill="url(#compassGlow)" />
  <circle cx="64" cy="64" r="48" fill="#F8FAFF" fill-opacity="0.92" filter="url(#softShadow)" />
  <circle cx="64" cy="64" r="47" stroke="url(#ringGradient)" stroke-width="5" />
  <circle cx="64" cy="64" r="36" stroke="#111827" stroke-opacity="0.12" stroke-width="1.5" />

  <g stroke-linecap="round">
    <path d="M64 20V29" stroke="#1D4ED8" stroke-width="3" />
    <path d="M64 99V108" stroke="#25CB7A" stroke-width="3" />
    <path d="M20 64H29" stroke="#F37575" stroke-width="3" />
    <path d="M99 64H108" stroke="#111827" stroke-opacity="0.36" stroke-width="3" />
  </g>

  <g class="compass-needle">
    <path d="M64 21L75 66L64 61L53 66L64 21Z" fill="url(#needleNorth)" />
    <path d="M64 107L53 62L64 67L75 62L64 107Z" fill="url(#needleSouth)" opacity="0.86" />
    <path d="M64 27L69 58L64 55L59 58L64 27Z" fill="#FFFFFF" fill-opacity="0.34" />
  </g>

  <circle cx="64" cy="64" r="7.5" fill="#111827" />
  <circle cx="64" cy="64" r="3.5" fill="#F8FAFF" />
  <path class="compass-glint" d="M37 33C45 27 55 24 65 24" stroke="#FFFFFF" stroke-linecap="round" stroke-width="4" opacity="0.18" />
</svg>
