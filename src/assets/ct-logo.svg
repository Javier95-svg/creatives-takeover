<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" preserveAspectRatio="xMidYMid meet" aria-label="Creatives Takeover Logo">
  <defs>
    <!-- Main gradient: Teal → Blue → Purple/Indigo → Reddish-Pink → Teal -->
    <linearGradient id="knotGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981"/> <!-- Teal/Aqua -->
      <stop offset="25%" stop-color="#3B82F6"/> <!-- Blue -->
      <stop offset="50%" stop-color="#6366F1"/> <!-- Purple/Indigo -->
      <stop offset="75%" stop-color="#EC4899"/> <!-- Reddish-Pink -->
      <stop offset="100%" stop-color="#10B981"/> <!-- Teal/Aqua -->
    </linearGradient>
    
    <!-- Radial gradient for 3D depth effect (highlights from top-left) -->
    <radialGradient id="highlightGradient" cx="35%" cy="25%" r="65%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.7"/>
      <stop offset="25%" stop-color="#ffffff" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.2"/>
      <stop offset="75%" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.3"/>
    </radialGradient>
    
    <!-- Shadow gradient for depth -->
    <radialGradient id="shadowGradient" cx="60%" cy="70%" r="50%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="50%" stop-color="#000000" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.4"/>
    </radialGradient>
    
    <!-- Shadow filter for 3D depth -->
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="2.5" dy="2.5" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Glow filter for the light outline -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Trefoil Knot - 3D tubular form with interwoven segments -->
  <g filter="url(#shadow)">
    <!-- Main knot path - continuous trefoil knot with rounded, volumetric form -->
    <path d="M 100 35
             C 75 35,55 55,55 80
             C 55 100,70 120,95 120
             C 120 120,140 100,145 80
             C 150 55,130 35,100 35
             M 100 35
             C 100 55,85 70,70 80
             C 50 90,35 110,45 130
             C 55 150,75 165,100 165
             C 125 165,145 150,155 130
             C 165 110,155 90,135 80
             C 115 70,100 55,100 35
             M 100 35
             C 125 35,145 55,145 80
             C 145 100,130 120,105 120
             C 80 120,60 100,55 80
             C 50 55,70 35,100 35 Z" 
          fill="url(#knotGradient)" 
          stroke="#E0F2FE" 
          stroke-width="0.8"
          stroke-linejoin="round"
          stroke-linecap="round"
          fill-rule="evenodd"
          filter="url(#glow)"/>
    
    <!-- Shadow overlay for depth in overlapping areas -->
    <path d="M 100 35
             C 75 35,55 55,55 80
             C 55 100,70 120,95 120
             C 120 120,140 100,145 80
             C 150 55,130 35,100 35
             M 100 35
             C 100 55,85 70,70 80
             C 50 90,35 110,45 130
             C 55 150,75 165,100 165
             C 125 165,145 150,155 130
             C 165 110,155 90,135 80
             C 115 70,100 55,100 35
             M 100 35
             C 125 35,145 55,145 80
             C 145 100,130 120,105 120
             C 80 120,60 100,55 80
             C 50 55,70 35,100 35 Z" 
          fill="url(#shadowGradient)" 
          opacity="0.6"
          fill-rule="evenodd"/>
    
    <!-- Highlight overlay for 3D shine effect (top-left light source) -->
    <path d="M 100 35
             C 75 35,55 55,55 80
             C 55 100,70 120,95 120
             C 120 120,140 100,145 80
             C 150 55,130 35,100 35
             M 100 35
             C 100 55,85 70,70 80
             C 50 90,35 110,45 130
             C 55 150,75 165,100 165
             C 125 165,145 150,155 130
             C 165 110,155 90,135 80
             C 115 70,100 55,100 35
             M 100 35
             C 125 35,145 55,145 80
             C 145 100,130 120,105 120
             C 80 120,60 100,55 80
             C 50 55,70 35,100 35 Z" 
          fill="url(#highlightGradient)" 
          opacity="0.7"
          mix-blend-mode="overlay"
          fill-rule="evenodd"/>
  </g>
</svg>
