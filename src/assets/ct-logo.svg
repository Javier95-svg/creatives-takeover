<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" preserveAspectRatio="xMidYMid meet" aria-label="Creatives Takeover Logo">
  <defs>
    <!-- Main gradient: Blue → Purple → Red → Teal → Blue -->
    <linearGradient id="knotGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="25%" stop-color="#8B5CF6"/>
      <stop offset="50%" stop-color="#EF4444"/>
      <stop offset="75%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    
    <!-- Radial gradient for 3D depth effect (highlights from top-left) -->
    <radialGradient id="highlightGradient" cx="40%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="30%" stop-color="#ffffff" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.2"/>
    </radialGradient>
    
    <!-- Shadow filter for 3D depth -->
    <filter id="shadow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2.5"/>
      <feOffset dx="2" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.25"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Trefoil Knot - Continuous path forming three interwoven loops -->
  <g filter="url(#shadow)">
    <path d="M 100 30 C 70 30,50 50,50 80 C 50 100,70 120,100 120 C 130 120,150 100,150 80 C 150 50,130 30,100 30 M 100 30 C 100 50,80 70,60 80 C 40 90,30 110,40 130 C 50 150,70 160,100 160 C 130 160,150 150,160 130 C 170 110,160 90,140 80 C 120 70,100 50,100 30 M 100 30 C 130 30,150 50,150 80 C 150 100,130 120,100 120 C 70 120,50 100,50 80 C 50 50,70 30,100 30 Z" 
          fill="url(#knotGradient)" 
          stroke="url(#knotGradient)" 
          stroke-width="1.2"
          stroke-linejoin="round"
          stroke-linecap="round"
          fill-rule="evenodd"/>
    
    <!-- Highlight overlay for 3D shine effect -->
    <path d="M 100 30 C 70 30,50 50,50 80 C 50 100,70 120,100 120 C 130 120,150 100,150 80 C 150 50,130 30,100 30 M 100 30 C 100 50,80 70,60 80 C 40 90,30 110,40 130 C 50 150,70 160,100 160 C 130 160,150 150,160 130 C 170 110,160 90,140 80 C 120 70,100 50,100 30 M 100 30 C 130 30,150 50,150 80 C 150 100,130 120,100 120 C 70 120,50 100,50 80 C 50 50,70 30,100 30 Z" 
          fill="url(#highlightGradient)" 
          opacity="0.5"
          mix-blend-mode="overlay"
          fill-rule="evenodd"/>
  </g>
</svg>
