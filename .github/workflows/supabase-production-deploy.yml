name: Deploy Supabase production

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

concurrency:
  group: supabase-production
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    steps:
      - name: Check out the verified commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Install pinned Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.98.2

      - name: Link production project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          set -o pipefail
          supabase link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD" 2>&1 | tee supabase-link.log

      - name: Preview pending migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          set -o pipefail
          supabase db push --linked --dry-run --password "$SUPABASE_DB_PASSWORD" 2>&1 | tee supabase-migration-dry-run.log

      - name: Apply migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          set -o pipefail
          supabase db push --linked --password "$SUPABASE_DB_PASSWORD" 2>&1 | tee supabase-migration-apply.log

      - name: Deploy customer discovery function
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          set -o pipefail
          supabase functions deploy pmf-customer-discovery --project-ref "$SUPABASE_PROJECT_REF" 2>&1 | tee supabase-function-deploy.log

      - name: Upload sanitized deployment logs
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: supabase-production-${{ github.event.workflow_run.head_sha }}
          path: supabase-*.log
          retention-days: 14

