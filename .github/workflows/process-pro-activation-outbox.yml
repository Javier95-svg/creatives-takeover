name: Process Pro Activation Outbox

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  process-outbox:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Trigger Pro activation worker
        env:
          SUPABASE_FUNCTION_URL: https://rcjlaybjnozqbsoxzboa.supabase.co/functions/v1/process-pro-activation-outbox
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PRO_ACTIVATION_WORKER_SECRET: ${{ secrets.PRO_ACTIVATION_WORKER_SECRET }}
        run: |
          set -euo pipefail

          response_file="$(mktemp)"
          status_code="$({
            curl --silent --show-error \
              --request POST \
              --url "$SUPABASE_FUNCTION_URL" \
              --header "Content-Type: application/json" \
              --header "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
              --header "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
              --header "x-pro-activation-worker-secret: $PRO_ACTIVATION_WORKER_SECRET" \
              --data '{"source":"github-actions","limit":25}' \
              --output "$response_file" \
              --write-out "%{http_code}"
          })"

          echo "HTTP $status_code"
          cat "$response_file"

          if [ "$status_code" -lt 200 ] || [ "$status_code" -ge 300 ]; then
            exit 1
          fi